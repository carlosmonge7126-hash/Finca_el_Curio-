<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>TRADER VISION AI | Análisis Local Móvil</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #00f5a0;
            --accent: #ffb347;
            --danger: #ff4d4d;
            --bg-dark: #0a0c0f;
            --panel-dark: rgba(10, 12, 15, 0.98);
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Inter', system-ui, sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: #eef2ff;
            font-family: var(--font-sans);
            min-height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
        }

        /* Contenedor principal con scroll */
        .main-container {
            position: relative;
            min-height: 100vh;
            padding-bottom: 180px;
        }

        #camera-container {
            position: relative;
            width: 100%;
            height: 50vh;
            min-height: 300px;
            background: #000;
            overflow: hidden;
            z-index: 1;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gradient-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 100%);
            pointer-events: none;
            z-index: 2;
        }

        /* Header fijo solo en desktop, en móvil fluye */
        .header {
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            padding: 12px 18px;
            z-index: 20;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,245,160,0.2);
        }

        .header-title {
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: -0.3px;
        }

        .header-title span {
            color: var(--primary);
            text-shadow: 0 0 6px rgba(0,245,160,0.4);
        }

        .badge-offline {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 5px 12px;
            border-radius: 60px;
            font-size: 0.65rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--primary);
        }

        .led {
            width: 8px;
            height: 8px;
            border-radius: 10px;
            background-color: var(--primary);
            box-shadow: 0 0 8px var(--primary);
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.9);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        /* Chat log con scroll vertical */
        #chat-log {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 300px;
        }

        .msg {
            padding: 12px 16px;
            border-radius: 20px;
            max-width: 92%;
            font-size: 0.9rem;
            line-height: 1.45;
            backdrop-filter: blur(8px);
            word-break: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-msg {
            background: rgba(0, 110, 255, 0.85);
            align-self: flex-end;
            border-bottom-right-radius: 6px;
            color: white;
            font-weight: 500;
        }

        .ai-msg {
            background: rgba(18, 22, 28, 0.95);
            align-self: flex-start;
            border-left: 3px solid var(--primary);
            color: #f0f3fa;
        }

        /* Panel de controles fijo en la parte inferior en móvil */
        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 30;
            background: var(--panel-dark);
            backdrop-filter: blur(20px);
            padding: 12px 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            border-top: 1px solid rgba(0,245,160,0.25);
            box-shadow: 0 -8px 25px rgba(0,0,0,0.6);
        }

        input {
            flex: 2;
            min-width: 120px;
            background: #1e1f24;
            border: 1px solid #2f313a;
            color: white;
            padding: 12px 16px;
            border-radius: 44px;
            font-size: 0.85rem;
            outline: none;
            transition: all 0.2s;
            font-family: var(--font-sans);
        }
        
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0,245,160,0.2);
        }

        button {
            background: rgba(0,245,160,0.12);
            backdrop-filter: blur(4px);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px 18px;
            border-radius: 44px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.3px;
            font-family: var(--font-sans);
            white-space: nowrap;
        }

        button.accent {
            background: var(--accent);
            border-color: var(--accent);
            color: #131313;
            box-shadow: 0 2px 12px rgba(255,180,70,0.3);
        }

        button:active {
            transform: scale(0.96);
        }

        button:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        canvas {
            display: none;
        }

        .confidence-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }
        
        .confidence-fill {
            height: 100%;
            background: var(--primary);
            transition: width 0.3s ease;
            border-radius: 3px;
        }
        
        .footer-note {
            text-align: center;
            padding: 12px;
            color: #6c6f78;
            font-size: 0.7rem;
            margin-top: 10px;
        }

        /* Scrollbar personalizado */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 5px;
        }

        /* Ajustes específicos para móviles */
        @media (max-width: 768px) {
            .header {
                position: sticky;
                top: 0;
                padding: 10px 16px;
            }
            
            .header-title {
                font-size: 1rem;
            }
            
            .badge-offline {
                font-size: 0.6rem;
                padding: 4px 10px;
            }
            
            #camera-container {
                height: 40vh;
                min-height: 280px;
            }
            
            .controls {
                padding: 12px;
                gap: 8px;
            }
            
            button {
                padding: 10px 14px;
                font-size: 0.75rem;
            }
            
            input {
                font-size: 0.8rem;
                padding: 10px 14px;
            }
            
            .msg {
                max-width: 95%;
                font-size: 0.85rem;
                padding: 10px 14px;
            }
            
            #chat-log {
                padding: 12px;
                padding-bottom: 20px;
            }
        }

        /* Para pantallas muy pequeñas */
        @media (max-width: 480px) {
            .controls {
                flex-wrap: wrap;
            }
            
            button {
                flex: 1;
                min-width: auto;
                white-space: normal;
                word-break: keep-all;
            }
            
            input {
                width: 100%;
                flex: auto;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Header sticky -->
        <div class="header">
            <div class="header-title">
                📊 <span>TRADER VISION AI</span>
            </div>
            <div class="badge-offline">
                <span class="led"></span>
                <span>🔒 LOCAL</span>
            </div>
        </div>

        <!-- Cámara -->
        <div id="camera-container">
            <video id="webcam" autoplay playsinline muted></video>
        </div>
        <div class="gradient-overlay"></div>

        <!-- Chat (scrollable) -->
        <div id="chat-log">
            <div class="msg ai-msg">
                🤖 <strong>IA Local Activada</strong><br>
                ✅ Sin internet requerida<br>
                📸 Apunta la cámara a gráficas<br>
                🧠 Análisis por visión computacional
            </div>
        </div>

        <div class="footer-note">
            🧠 IA Local - Análisis de patrones, colores y estructuras
        </div>
    </div>

    <!-- Panel de controles fijo -->
    <div class="controls">
        <input type="text" id="user-prompt" placeholder="📝 Pregunta específica..." autocomplete="off">
        <button id="send-btn">⚡ RÁPIDO</button>
        <button id="trading-btn" class="accent">🔍 DETALLADO</button>
        <button id="clear-btn">🗑️ LIMPIAR</button>
    </div>

    <canvas id="snapshot"></canvas>

    <script>
        (function(){
            // ========== ANALIZADOR LOCAL SIN API ==========
            class LocalTradingAnalyzer {
                constructor() {
                    this.version = "2.0 - Móvil Optimizado";
                }
                
                async analyzeImage(canvas, userQuestion = "") {
                    const ctx = canvas.getContext('2d');
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    
                    const colorAnalysis = this.analyzeColorDistribution(imageData);
                    const patterns = this.detectCandlePatterns(imageData, canvas.width, canvas.height);
                    const momentum = this.calculateMomentum(imageData, canvas.width);
                    const levels = this.findKeyLevels(imageData, canvas.height);
                    const signal = this.generateTradingSignal(colorAnalysis, patterns, momentum, levels);
                    
                    let userResponse = "";
                    if(userQuestion && userQuestion.trim().length > 0) {
                        userResponse = this.answerUserQuestion(userQuestion, signal, levels);
                    }
                    
                    return { signal, userResponse };
                }
                
                analyzeColorDistribution(imageData) {
                    let greenIntensity = 0;
                    let redIntensity = 0;
                    let samples = 0;
                    
                    for(let i = 0; i < imageData.data.length; i += 80) {
                        const r = imageData.data[i];
                        const g = imageData.data[i+1];
                        const b = imageData.data[i+2];
                        
                        if(g > r && g > b && g > 80) {
                            greenIntensity += (g - Math.max(r, b)) / 255;
                            samples++;
                        }
                        else if(r > g && r > b && r > 80) {
                            redIntensity += (r - Math.max(g, b)) / 255;
                            samples++;
                        }
                    }
                    
                    const greenScore = samples > 0 ? greenIntensity / samples : 0;
                    const redScore = samples > 0 ? redIntensity / samples : 0;
                    const dominance = greenScore - redScore;
                    
                    return {
                        bullishStrength: Math.min(1, Math.max(0, greenScore * 1.5)),
                        bearishStrength: Math.min(1, Math.max(0, redScore * 1.5)),
                        dominance: dominance,
                        trend: dominance > 0.15 ? "BULLISH" : dominance < -0.15 ? "BEARISH" : "NEUTRAL"
                    };
                }
                
                detectCandlePatterns(imageData, width, height) {
                    const midY = height / 2;
                    let largeCandles = 0;
                    let smallBodies = 0;
                    
                    for(let x = 0; x < width; x += Math.floor(width/20)) {
                        const sampleY = midY;
                        const idx = (Math.floor(sampleY) * width + x) * 4;
                        if(idx < imageData.data.length) {
                            const brightness = (imageData.data[idx] + imageData.data[idx+1] + imageData.data[idx+2]) / 3;
                            if(brightness > 150) largeCandles++;
                            else if(brightness < 50) smallBodies++;
                        }
                    }
                    
                    return {
                        hasLargeCandles: largeCandles > 3,
                        hasSmallBodies: smallBodies > 5,
                        pattern: largeCandles > 5 ? "VOLATILIDAD_ALTA" : "RANGO_NORMAL"
                    };
                }
                
                calculateMomentum(imageData, width) {
                    let leftIntensity = 0;
                    let rightIntensity = 0;
                    let leftCount = 0;
                    let rightCount = 0;
                    
                    for(let y = 0; y < imageData.height; y += 10) {
                        for(let x = 0; x < width; x += 10) {
                            const idx = (y * width + x) * 4;
                            if(idx < imageData.data.length) {
                                const brightness = (imageData.data[idx] + imageData.data[idx+1] + imageData.data[idx+2]) / 3;
                                if(x < width/2) {
                                    leftIntensity += brightness;
                                    leftCount++;
                                } else {
                                    rightIntensity += brightness;
                                    rightCount++;
                                }
                            }
                        }
                    }
                    
                    const leftAvg = leftCount > 0 ? leftIntensity / leftCount : 0;
                    const rightAvg = rightCount > 0 ? rightIntensity / rightCount : 0;
                    const momentum = (rightAvg - leftAvg) / 255;
                    
                    return {
                        value: momentum,
                        direction: momentum > 0.1 ? "ACELERACION_ALCISTA" : momentum < -0.1 ? "ACELERACION_BAJISTA" : "NEUTRAL",
                        strength: Math.abs(momentum)
                    };
                }
                
                findKeyLevels(imageData, height) {
                    const zones = [];
                    const zoneHeight = Math.floor(height / 5);
                    
                    for(let z = 0; z < 5; z++) {
                        const startY = z * zoneHeight;
                        let intensity = 0;
                        let count = 0;
                        
                        for(let y = startY; y < startY + zoneHeight && y < height; y += 5) {
                            for(let x = 0; x < 100; x += 10) {
                                const idx = (y * 100 + x) * 4;
                                if(idx < imageData.data.length) {
                                    intensity += (imageData.data[idx] + imageData.data[idx+1] + imageData.data[idx+2]) / 3;
                                    count++;
                                }
                            }
                        }
                        
                        const avgIntensity = count > 0 ? intensity / count : 0;
                        zones.push({ level: z, intensity: avgIntensity, y: startY });
                    }
                    
                    const strongLevels = zones.filter(z => z.intensity > 150);
                    return {
                        supportLevels: strongLevels.slice(0, 2),
                        resistanceLevels: strongLevels.slice(2, 4),
                        keyZones: strongLevels.length
                    };
                }
                
                generateTradingSignal(colorAnalysis, patterns, momentum, levels) {
                    let score = 0;
                    let reasons = [];
                    
                    if(colorAnalysis.trend === "BULLISH") {
                        score += 35;
                        reasons.push("✅ Predominio de velas verdes");
                    } else if(colorAnalysis.trend === "BEARISH") {
                        score -= 35;
                        reasons.push("⚠️ Predominio de velas rojas");
                    } else {
                        score += 5;
                        reasons.push("⚖️ Balance cromático neutral");
                    }
                    
                    if(momentum.direction === "ACELERACION_ALCISTA") {
                        score += 30;
                        reasons.push("📈 Momentum positivo detectado");
                    } else if(momentum.direction === "ACELERACION_BAJISTA") {
                        score -= 30;
                        reasons.push("📉 Momentum negativo detectado");
                    }
                    
                    if(patterns.hasLargeCandles) {
                        score += Math.abs(score) * 0.2;
                        reasons.push("🕯️ Velas de gran tamaño");
                    }
                    
                    if(levels.keyZones >= 2) {
                        if(score > 0) score += 15;
                        else score -= 15;
                        reasons.push("🎯 Zonas clave detectadas");
                    }
                    
                    let decision = "NEUTRAL";
                    let confidence = Math.min(95, Math.max(55, 60 + Math.abs(score) * 0.5));
                    
                    if(score > 25) decision = "COMPRAR";
                    else if(score < -25) decision = "VENDER";
                    
                    confidence = Math.floor(confidence);
                    
                    return {
                        decision: decision,
                        confidence: confidence,
                        score: score,
                        reasons: reasons.slice(0, 4),
                        timestamp: new Date().toLocaleTimeString()
                    };
                }
                
                answerUserQuestion(question, signal, levels) {
                    question = question.toLowerCase();
                    
                    if(question.includes("soporte") || question.includes("resistencia")) {
                        return `📊 Niveles clave: ${levels.keyZones} zonas de alta densidad identificadas. Soportes detectados.`;
                    } 
                    else if(question.includes("confianza") || question.includes("seguro")) {
                        return `🎯 Confianza actual: ${signal.confidence}% basado en análisis visual y momentum.`;
                    }
                    else if(question.includes("tendencia")) {
                        return `📈 Tendencia: ${signal.score > 0 ? "ALCISTA" : signal.score < 0 ? "BAJISTA" : "LATERAL"} (${Math.abs(signal.score).toFixed(0)}/100)`;
                    }
                    else {
                        return `💡 Señal: ${signal.decision} con ${signal.confidence}% confianza. ${signal.reasons[0] || "Análisis completado"}`;
                    }
                }
                
                getFormattedAnalysis(result) {
                    const signal = result.signal;
                    const emoji = signal.decision === "COMPRAR" ? "🚀" : signal.decision === "VENDER" ? "⚠️" : "⚖️";
                    
                    let html = `<div style="font-weight:700;margin-bottom:8px;">${emoji} <span style="color:${signal.decision === 'COMPRAR' ? '#00f5a0' : signal.decision === 'VENDER' ? '#ff6666' : '#ffb347'}">DECISIÓN: ${signal.decision}</span> (${signal.confidence}%)</div>`;
                    html += `<div style="font-size:0.85rem;margin-bottom:8px;"><strong>🎯 RAZONES:</strong><br>`;
                    signal.reasons.forEach(r => { html += `• ${r}<br>`; });
                    html += `</div><div class="confidence-bar"><div class="confidence-fill" style="width: ${signal.confidence}%;"></div></div>`;
                    
                    if(result.userResponse) {
                        html += `<div style="margin-top:12px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.1);">
                                <strong>💬 Respuesta:</strong><br>${result.userResponse}</div>`;
                    }
                    
                    html += `<div style="font-size:0.7rem;margin-top:8px;color:#aaa;">⏱️ ${signal.timestamp} | 🔍 Local AI</div>`;
                    return html;
                }
            }
            
            // ========== CONFIGURACIÓN MÓVIL ==========
            const video = document.getElementById('webcam');
            const canvas = document.getElementById('snapshot');
            const promptInput = document.getElementById('user-prompt');
            const sendBtn = document.getElementById('send-btn');
            const tradingBtn = document.getElementById('trading-btn');
            const clearBtn = document.getElementById('clear-btn');
            const chatLog = document.getElementById('chat-log');
            
            let cameraActive = false;
            let currentAnalysisLock = false;
            const analyzer = new LocalTradingAnalyzer();
            
            function addMessage(text, type, isHtml = false) {
                const div = document.createElement('div');
                div.className = `msg ${type}-msg`;
                if(isHtml) {
                    div.innerHTML = text;
                } else {
                    div.innerText = text;
                }
                chatLog.appendChild(div);
                setTimeout(() => div.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
            }
            
            async function captureFrame() {
                if(!video.videoWidth || !video.videoHeight) {
                    await new Promise(resolve => {
                        if(video.readyState >= 2) return resolve();
                        video.addEventListener('loadeddata', () => resolve(), { once: true });
                    });
                }
                canvas.width = Math.min(video.videoWidth, 1280);
                canvas.height = Math.min(video.videoHeight, 720);
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                return canvas;
            }
            
            async function performAnalysis(mode) {
                if(currentAnalysisLock) {
                    addMessage("⏳ Espera, analizando...", "ai");
                    return;
                }
                
                if(!cameraActive || !video.videoWidth) {
                    addMessage("📷 Cámara no lista. Activando...", "ai");
                    return;
                }
                
                currentAnalysisLock = true;
                sendBtn.disabled = true;
                tradingBtn.disabled = true;
                
                const userQuestion = promptInput.value.trim();
                const modeText = mode === 'fast' ? "⚡ ANÁLISIS RÁPIDO" : "🔍 ANÁLISIS DETALLADO";
                addMessage(`${modeText} procesando...`, "user");
                
                try {
                    const capturedCanvas = await captureFrame();
                    const result = await analyzer.analyzeImage(capturedCanvas, userQuestion);
                    const formattedOutput = analyzer.getFormattedAnalysis(result);
                    addMessage(formattedOutput, "ai", true);
                    if(userQuestion) promptInput.value = "";
                } catch(error) {
                    console.error(error);
                    addMessage(`❌ Error: ${error.message}`, "ai");
                } finally {
                    currentAnalysisLock = false;
                    sendBtn.disabled = false;
                    tradingBtn.disabled = false;
                }
            }
            
            async function startCamera() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: "environment" } 
                    });
                    video.srcObject = stream;
                    await new Promise((resolve) => {
                        video.onloadedmetadata = () => {
                            video.play();
                            resolve();
                        };
                    });
                    cameraActive = true;
                    addMessage("✅ Cámara activa. Enfoca la gráfica.", "ai");
                } catch(err) {
                    console.error(err);
                    cameraActive = false;
                    addMessage("❌ Error de cámara. Verifica permisos.", "ai");
                }
            }
            
            // Eventos
            sendBtn.addEventListener('click', () => performAnalysis('fast'));
            tradingBtn.addEventListener('click', () => performAnalysis('detailed'));
            clearBtn.addEventListener('click', () => {
                while(chatLog.children.length > 0) chatLog.removeChild(chatLog.lastChild);
                addMessage("🧹 Chat limpiado. Listo para nuevos análisis.", "ai");
            });
            
            promptInput.addEventListener('keypress', (e) => {
                if(e.key === 'Enter' && !currentAnalysisLock && cameraActive) {
                    e.preventDefault();
                    performAnalysis('fast');
                }
            });
            
            window.addEventListener('load', startCamera);
            
            window.addEventListener('beforeunload', () => {
                if(video.srcObject) {
                    video.srcObject.getTracks().forEach(track => track.stop());
                }
            });
        })();
    </script>
</body>
</html>
