<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>TRADER VISION | ANÁLISIS EN TIEMPO REAL</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #00f5a0;
            --accent: #ffb347;
            --danger: #ff4d4d;
            --bg-dark: #0a0c0f;
            --panel-dark: rgba(10, 12, 15, 0.95);
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Inter', system-ui, sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: #eef2ff;
            font-family: var(--font-sans);
            min-height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Header fijo */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(12px);
            padding: 10px 16px;
            z-index: 20;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,245,160,0.3);
        }

        .header-title {
            font-weight: 800;
            font-size: 0.95rem;
        }

        .header-title span {
            color: var(--primary);
        }

        .badge {
            background: rgba(0,245,160,0.15);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--primary);
        }

        /* Contenedor de cámara */
        #camera-container {
            position: relative;
            width: 100%;
            height: 40vh;
            min-height: 280px;
            background: #000;
            overflow: hidden;
            margin-top: 48px;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* SEÑAL EN VIVO - GRANDE Y CLARA */
        .live-signal {
            position: fixed;
            top: 60px;
            right: 12px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(16px);
            padding: 8px 16px;
            border-radius: 40px;
            z-index: 25;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(0,245,160,0.3);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .signal-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulseSignal 1.5s infinite;
        }

        .signal-dot.buy { background: #00f5a0; box-shadow: 0 0 10px #00f5a0; }
        .signal-dot.sell { background: #ff4d4d; box-shadow: 0 0 10px #ff4d4d; }
        .signal-dot.neutral { background: #ffb347; box-shadow: 0 0 10px #ffb347; }

        .signal-text {
            font-weight: 800;
            font-size: 1rem;
        }

        .signal-text.buy { color: #00f5a0; }
        .signal-text.sell { color: #ff4d4d; }
        .signal-text.neutral { color: #ffb347; }

        .signal-confidence {
            font-size: 0.7rem;
            color: #aaa;
        }

        /* Panel de métricas en tiempo real */
        .metrics-panel {
            position: fixed;
            top: 60px;
            left: 12px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            padding: 8px 12px;
            border-radius: 16px;
            z-index: 25;
            font-size: 0.7rem;
            min-width: 120px;
            border-left: 3px solid var(--primary);
        }

        .metrics-panel div {
            margin: 4px 0;
        }

        /* Historial de señales */
        #chat-log {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 42vh;
            overflow-y: auto;
            margin-bottom: 80px;
        }

        .msg {
            padding: 10px 14px;
            border-radius: 16px;
            max-width: 95%;
            font-size: 0.85rem;
            line-height: 1.4;
            animation: fadeIn 0.2s ease;
        }

        .signal-msg {
            border-left: 3px solid;
            background: rgba(18, 22, 28, 0.95);
        }

        .signal-msg.buy { border-left-color: #00f5a0; }
        .signal-msg.sell { border-left-color: #ff4d4d; }
        .signal-msg.neutral { border-left-color: #ffb347; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Botones flotantes */
        .floating-buttons {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--panel-dark);
            backdrop-filter: blur(20px);
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            z-index: 30;
            border-top: 1px solid rgba(0,245,160,0.2);
        }

        button {
            flex: 1;
            background: rgba(0,245,160,0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 12px;
            border-radius: 44px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
        }

        button.danger {
            border-color: #ff4d4d;
            color: #ff4d4d;
        }

        button:active {
            transform: scale(0.97);
        }

        .status-indicator {
            position: fixed;
            bottom: 80px;
            right: 12px;
            background: rgba(0,0,0,0.7);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.6rem;
            z-index: 25;
        }

        canvas {
            display: none;
        }

        @media (max-width: 768px) {
            .metrics-panel { display: none; }
            .live-signal { top: 55px; right: 8px; padding: 6px 12px; }
            .signal-text { font-size: 0.85rem; }
            #camera-container { height: 38vh; margin-top: 48px; }
            #chat-log { max-height: 45vh; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-title">
        📹 <span>TRADER VISION RT</span>
    </div>
    <div class="badge">
        🟢 EN VIVO • 24/7
    </div>
</div>

<div id="camera-container">
    <video id="webcam" autoplay playsinline muted></video>
</div>

<!-- Señal en tiempo real grande -->
<div class="live-signal" id="liveSignal">
    <div class="signal-dot neutral" id="signalDot"></div>
    <div>
        <div class="signal-text neutral" id="signalText">ESPERANDO...</div>
        <div class="signal-confidence" id="signalConfidence">---</div>
    </div>
</div>

<!-- Panel de métricas (opcional) -->
<div class="metrics-panel" id="metricsPanel">
    <div>📊 Tendencia: <span id="trendValue">---</span></div>
    <div>⚡ Momentum: <span id="momentumValue">---</span></div>
    <div>🎯 Confianza: <span id="confidenceValue">---</span></div>
</div>

<!-- Historial de señales -->
<div id="chat-log">
    <div class="msg signal-msg neutral">
        🤖 <strong>ANÁLISIS EN TIEMPO REAL ACTIVADO</strong><br>
        ✅ La IA analiza CADA SEGUNDO lo que ves<br>
        📊 Las señales aparecen automáticamente<br>
        🎯 COMPRAR 🟢 / VENDER 🔴 / NEUTRAL 🟠
    </div>
</div>

<div class="floating-buttons">
    <button id="clearBtn" class="danger">🗑️ LIMPIAR</button>
</div>
<div class="status-indicator" id="statusIndicator">
    📹 Inicializando...
</div>

<canvas id="snapshot"></canvas>

<script>
    (function(){
        // ========== ANALIZADOR EN TIEMPO REAL ==========
        class RealTimeTradingAI {
            constructor() {
                this.frameHistory = [];     // Almacena últimos 30 frames (~6 segundos)
                this.signals = [];
                this.maxHistory = 30;       // 30 frames = ~6 segundos a 5fps
                this.lastSignal = null;
                this.lastSignalTime = 0;
                this.signalCooldown = 3000; // No repetir misma señal cada 3 segundos
            }
            
            // Analizar un frame y actualizar historial
            analyzeFrame(imageData, width, height) {
                // Extraer características del frame
                const features = this.extractFeatures(imageData, width, height);
                
                // Agregar al historial
                this.frameHistory.push({
                    timestamp: Date.now(),
                    ...features
                });
                
                // Mantener solo últimos N frames
                if (this.frameHistory.length > this.maxHistory) {
                    this.frameHistory.shift();
                }
                
                // Si tenemos suficiente historial, calcular señal
                if (this.frameHistory.length >= 10) {
                    return this.calculateRealTimeSignal();
                }
                
                return null;
            }
            
            extractFeatures(imageData, width, height) {
                let greenIntensity = 0;
                let redIntensity = 0;
                let blueIntensity = 0;
                let samples = 0;
                let totalBrightness = 0;
                let brightnessSamples = 0;
                
                // Muestreo inteligente para rendimiento
                const step = 15;
                for(let y = 0; y < height; y += step) {
                    for(let x = 0; x < width; x += step) {
                        const idx = (y * width + x) * 4;
                        if(idx + 2 < imageData.data.length) {
                            const r = imageData.data[idx];
                            const g = imageData.data[idx+1];
                            const b = imageData.data[idx+2];
                            const brightness = (r + g + b) / 3;
                            totalBrightness += brightness;
                            brightnessSamples++;
                            
                            // Detectar velas según colores típicos de trading
                            // Verde (bullish): g > r y g > 80
                            if(g > r && g > b && g > 70) {
                                greenIntensity += (g - Math.max(r, b)) / 255;
                                samples++;
                            }
                            // Rojo (bearish): r > g y r > 70
                            else if(r > g && r > b && r > 70) {
                                redIntensity += (r - Math.max(g, b)) / 255;
                                samples++;
                            }
                            // Azul/otros
                            else if(b > r && b > g && b > 70) {
                                blueIntensity += (b - Math.max(r, g)) / 255;
                                samples++;
                            }
                        }
                    }
                }
                
                const avgBrightness = brightnessSamples > 0 ? totalBrightness / brightnessSamples : 128;
                const greenScore = samples > 0 ? greenIntensity / samples : 0.5;
                const redScore = samples > 0 ? redIntensity / samples : 0.5;
                const blueScore = samples > 0 ? blueIntensity / samples : 0.3;
                
                // Score neto: positivo = alcista, negativo = bajista
                let netScore = greenScore - redScore;
                
                // Ajuste por brillo (velas más brillantes = más movimiento)
                const brightnessFactor = (avgBrightness - 100) / 100;
                netScore = netScore + (brightnessFactor * 0.1);
                
                return {
                    green: greenScore,
                    red: redScore,
                    blue: blueScore,
                    netScore: netScore,
                    brightness: avgBrightness,
                    timestamp: Date.now()
                };
            }
            
            calculateRealTimeSignal() {
                if (this.frameHistory.length < 10) return null;
                
                const n = this.frameHistory.length;
                const scores = this.frameHistory.map(f => f.netScore);
                
                // 1. Tendencia actual (últimos 5 frames vs primeros 5)
                const recentScores = scores.slice(-8);
                const olderScores = scores.slice(0, 8);
                const recentAvg = this.average(recentScores);
                const olderAvg = this.average(olderScores);
                const trend = recentAvg - olderAvg;
                
                // 2. Momentum instantáneo (cambio entre últimos frames)
                const lastScore = scores[scores.length - 1];
                const prevScore = scores[scores.length - 2] || lastScore;
                const instantMomentum = lastScore - prevScore;
                
                // 3. Tendencia general (regresión simple)
                let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
                for(let i = 0; i < n; i++) {
                    sumX += i;
                    sumY += scores[i];
                    sumXY += i * scores[i];
                    sumX2 += i * i;
                }
                const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
                
                // 4. Volatilidad (desviación estándar)
                const avgScore = this.average(scores);
                const variance = scores.reduce((sum, s) => sum + Math.pow(s - avgScore, 2), 0) / n;
                const volatility = Math.sqrt(variance);
                
                // 5. Consistencia (qué porcentaje de frames siguen la tendencia)
                let consistentCount = 0;
                for(let i = 1; i < n; i++) {
                    if((slope > 0 && scores[i] > scores[i-1]) || (slope < 0 && scores[i] < scores[i-1])) {
                        consistentCount++;
                    }
                }
                const consistency = consistentCount / (n - 1);
                
                // 6. DECISIÓN EN TIEMPO REAL
                let decision = "NEUTRAL";
                let confidence = 50;
                let reasons = [];
                
                // Factor tendencia
                if (trend > 0.08) {
                    confidence += 20;
                    reasons.push(`tendencia alcista`);
                } else if (trend < -0.08) {
                    confidence -= 20;
                    reasons.push(`tendencia bajista`);
                } else if (trend > 0.03) {
                    confidence += 10;
                    reasons.push(`leve tendencia alcista`);
                } else if (trend < -0.03) {
                    confidence -= 10;
                    reasons.push(`leve tendencia bajista`);
                }
                
                // Factor momentum
                if (instantMomentum > 0.05) {
                    confidence += 15;
                    reasons.push(`momentum positivo`);
                } else if (instantMomentum < -0.05) {
                    confidence -= 15;
                    reasons.push(`momentum negativo`);
                }
                
                // Factor pendiente (slope)
                if (slope > 0.02) {
                    confidence += 10;
                } else if (slope < -0.02) {
                    confidence -= 10;
                }
                
                // Factor consistencia (aumenta confianza si es alta)
                if (consistency > 0.7) {
                    confidence += 10;
                    reasons.push(`alta consistencia`);
                } else if (consistency < 0.4) {
                    confidence -= 10;
                    reasons.push(`baja consistencia`);
                }
                
                // Ajuste por volatilidad
                if (volatility > 0.25) {
                    confidence -= 10;
                    reasons.push(`alta volatilidad`);
                }
                
                // Decisión final
                confidence = Math.min(94, Math.max(35, Math.floor(confidence)));
                
                if (confidence >= 65) {
                    if (trend > 0.03 || slope > 0.015) {
                        decision = "COMPRAR 🟢";
                    } else if (trend < -0.03 || slope < -0.015) {
                        decision = "VENDER 🔴";
                    } else {
                        decision = "NEUTRAL 🟠";
                        confidence = 50;
                    }
                } else if (confidence >= 55) {
                    if (trend > 0.05) decision = "COMPRAR 🟢";
                    else if (trend < -0.05) decision = "VENDER 🔴";
                    else decision = "NEUTRAL 🟠";
                } else {
                    decision = "NEUTRAL 🟠";
                }
                
                // Información adicional
                const trendStrength = Math.abs(trend) * 100;
                const momentumStrength = Math.abs(instantMomentum) * 100;
                
                return {
                    decision: decision,
                    confidence: confidence,
                    trend: trend,
                    slope: slope,
                    momentum: instantMomentum,
                    consistency: consistency,
                    volatility: volatility,
                    reasons: reasons,
                    trendStrength: Math.min(100, Math.floor(trendStrength)),
                    momentumStrength: Math.min(100, Math.floor(momentumStrength)),
                    lastScore: lastScore,
                    timestamp: new Date()
                };
            }
            
            average(arr) {
                if (arr.length === 0) return 0;
                return arr.reduce((a, b) => a + b, 0) / arr.length;
            }
            
            shouldSendSignal(signal) {
                if (!signal) return false;
                
                const now = Date.now();
                const isDifferent = this.lastSignal !== signal.decision;
                const cooldownPassed = (now - this.lastSignalTime) >= this.signalCooldown;
                
                // Enviar señal si es diferente o pasó el cooldown
                if (isDifferent || cooldownPassed) {
                    this.lastSignal = signal.decision;
                    this.lastSignalTime = now;
                    return true;
                }
                return false;
            }
            
            getSignalColor(signal) {
                if (signal.decision.includes("COMPRAR")) return "buy";
                if (signal.decision.includes("VENDER")) return "sell";
                return "neutral";
            }
        }
        
        // ========== CONFIGURACIÓN ==========
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('snapshot');
        const clearBtn = document.getElementById('clearBtn');
        const chatLog = document.getElementById('chat-log');
        const statusIndicator = document.getElementById('statusIndicator');
        
        // Elementos de UI en vivo
        const signalDot = document.getElementById('signalDot');
        const signalText = document.getElementById('signalText');
        const signalConfidence = document.getElementById('signalConfidence');
        const trendValue = document.getElementById('trendValue');
        const momentumValue = document.getElementById('momentumValue');
        const confidenceValue = document.getElementById('confidenceValue');
        
        let cameraActive = false;
        let analysisInterval = null;
        let frameCount = 0;
        const ai = new RealTimeTradingAI();
        
        function addSignalToHistory(signal) {
            const color = ai.getSignalColor(signal);
            const emoji = signal.decision.includes("COMPRAR") ? "🟢" : signal.decision.includes("VENDER") ? "🔴" : "🟠";
            const confidenceStars = "★".repeat(Math.floor(signal.confidence / 20)) + "☆".repeat(5 - Math.floor(signal.confidence / 20));
            
            const div = document.createElement('div');
            div.className = `msg signal-msg ${color}`;
            div.innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <strong>${emoji} ${signal.decision}</strong>
                    <span style="font-size:0.7rem;">${signal.confidence}% ${confidenceStars}</span>
                </div>
                <div style="font-size:0.75rem;color:#aaa;margin-top:4px;">
                    📈 Tendencia: ${signal.trend > 0 ? '+' : ''}${signal.trend.toFixed(3)} | 
                    ⚡ Mom: ${signal.momentum > 0 ? '+' : ''}${signal.momentum.toFixed(3)}
                </div>
                <div style="font-size:0.7rem;color:#888;margin-top:4px;">
                    ${signal.reasons.slice(0,2).join(' • ')}
                </div>
                <div style="font-size:0.6rem;color:#555;margin-top:4px;">
                    ${signal.timestamp.toLocaleTimeString()}
                </div>
            `;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
            
            // Limitar historial a 50 mensajes
            while (chatLog.children.length > 50) {
                chatLog.removeChild(chatLog.firstChild);
            }
        }
        
        function updateLiveUI(signal) {
            if (!signal) return;
            
            const color = ai.getSignalColor(signal);
            
            // Actualizar UI en vivo
            signalDot.className = `signal-dot ${color}`;
            signalText.className = `signal-text ${color}`;
            signalText.textContent = signal.decision;
            signalConfidence.textContent = `Confianza: ${signal.confidence}%`;
            
            // Actualizar métricas
            trendValue.textContent = signal.trend > 0 ? `+${signal.trend.toFixed(3)}` : signal.trend.toFixed(3);
            trendValue.style.color = signal.trend > 0 ? '#00f5a0' : signal.trend < 0 ? '#ff6666' : '#ffb347';
            momentumValue.textContent = signal.momentum > 0 ? `+${signal.momentum.toFixed(3)}` : signal.momentum.toFixed(3);
            momentumValue.style.color = signal.momentum > 0 ? '#00f5a0' : signal.momentum < 0 ? '#ff6666' : '#ffb347';
            confidenceValue.textContent = `${signal.confidence}%`;
            confidenceValue.style.color = signal.confidence > 65 ? '#00f5a0' : signal.confidence > 45 ? '#ffb347' : '#ff6666';
        }
        
        async function captureAndAnalyze() {
            if (!cameraActive || !video.videoWidth) return;
            
            try {
                canvas.width = Math.min(video.videoWidth, 320);
                canvas.height = Math.min(video.videoHeight, 240);
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const signal = ai.analyzeFrame(imageData, canvas.width, canvas.height);
                
                if (signal && ai.shouldSendSignal(signal)) {
                    addSignalToHistory(signal);
                }
                
                // Siempre actualizar UI con la última señal
                if (signal) {
                    updateLiveUI(signal);
                }
                
                frameCount++;
                statusIndicator.textContent = `🎯 Analizando... ${frameCount} frames`;
                
            } catch (error) {
                console.error("Error en análisis:", error);
            }
        }
        
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });
                cameraActive = true;
                statusIndicator.textContent = "✅ Cámara activa - Analizando en tiempo real";
                
                // Iniciar análisis continuo (cada 0.5 segundos = 2 frames por segundo)
                analysisInterval = setInterval(() => {
                    captureAndAnalyze();
                }, 500);
                
            } catch(err) {
                console.error(err);
                cameraActive = false;
                statusIndicator.textContent = "❌ Error de cámara - Verifica permisos";
                signalText.textContent = "ERROR";
            }
        }
        
        clearBtn.addEventListener('click', () => {
            while(chatLog.children.length > 0) chatLog.removeChild(chatLog.lastChild);
            addSignalToHistory({
                decision: "NEUTRAL 🟠",
                confidence: 0,
                trend: 0,
                momentum: 0,
                reasons: ["Sistema reiniciado"],
                timestamp: new Date()
            });
        });
        
        window.addEventListener('load', startCamera);
        
        window.addEventListener('beforeunload', () => {
            if (analysisInterval) clearInterval(analysisInterval);
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        });
        
        // Mensaje de bienvenida
        setTimeout(() => {
            if (cameraActive) {
                addSignalToHistory({
                    decision: "NEUTRAL 🟠",
                    confidence: 0,
                    trend: 0,
                    momentum: 0,
                    reasons: ["Sistema listo", "Analizando en tiempo real"],
                    timestamp: new Date()
                });
            }
        }, 2000);
        
    })();
</script>
</body>
</html>
