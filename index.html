<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IA Trader Vision Pro</title>
    <style>
        :root { --primary: #00ff88; --bg: #000; --panel: rgba(22, 22, 22, 0.9); --text: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }
        #camera-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #chat-log { position: absolute; top: 10px; left: 10px; right: 10px; z-index: 2; max-height: 40%; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .msg { padding: 10px; border-radius: 8px; max-width: 85%; font-size: 14px; backdrop-filter: blur(10px); pointer-events: auto; }
        .user-msg { background: rgba(0, 123, 255, 0.6); align-self: flex-end; }
        .ai-msg { background: rgba(0, 0, 0, 0.7); align-self: flex-start; border-left: 3px solid var(--primary); color: #00ff88; }
        .controls { position: absolute; bottom: 0; left: 0; right: 0; z-index: 3; background: var(--panel); display: flex; align-items: center; padding: 15px; gap: 10px; padding-bottom: env(safe-area-inset-bottom, 15px); }
        input { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; font-size: 16px; outline: none; }
        button { background: var(--primary); color: #000; border: none; padding: 12px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        canvas { display: none; }
    </style>
</head>
<body>
    <div id="camera-container"><video id="webcam" autoplay playsinline></video></div>
    <div id="chat-log"><div class="msg ai-msg">SISTEMA ACTIVO. Apunta a la gráfica y dale a ANALIZAR.</div></div>
    <div class="controls">
        <input type="text" id="user-prompt" placeholder="¿Qué ves aquí?">
        <button id="send-btn">ANALIZAR</button>
    </div>
    <canvas id="snapshot"></canvas>

    <script>
        // ASEGÚRATE DE QUE ESTA CLAVE SEA LA NUEVA QUE CREASTE HOY
        const API_KEY = "AIzaSyCvzHBFAa_flCedpCWko7vz6gOyr2bnego"; 
        
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('snapshot');
        const promptInput = document.getElementById('user-prompt');
        const sendBtn = document.getElementById('send-btn');
        const chatLog = document.getElementById('chat-log');

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
            } catch (err) {
                video.srcObject = await navigator.mediaDevices.getUserMedia({ video: true });
            }
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}-msg`;
            div.innerText = text;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        async function runAnalysis() {
            const prompt = promptInput.value.trim() || "¿Qué ves en esta gráfica de trading?";
            addMessage(prompt, 'user');
            promptInput.value = "";
            sendBtn.disabled = true;
            addMessage("Consultando a la IA...", "ai");

            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            const base64Image = canvas.toDataURL('image/jpeg', 0.4).split(',')[1];

            // Intentamos con la versión v1 que es la estándar actual
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: base64Image } }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    addMessage("Detalle: " + data.error.message, "ai");
                } else {
                    addMessage(data.candidates[0].content.parts[0].text, "ai");
                }
            } catch (err) {
                addMessage("Error de conexión al servidor.", "ai");
            } finally {
                sendBtn.disabled = false;
            }
        }

        sendBtn.addEventListener('click', runAnalysis);
        startCamera();
    </script>
</body>
</html>
