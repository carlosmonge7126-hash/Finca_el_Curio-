<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>TRADER VISION | DECISIÓN CLARA</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --buy: #00f5a0;
            --sell: #ff4d4d;
            --neutral: #ffb347;
            --bg-dark: #0a0c0f;
        }

        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
            min-height: 100vh;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .header-title {
            font-weight: 800;
            font-size: 1rem;
        }

        .header-title span {
            color: var(--buy);
        }

        .status-badge {
            font-size: 0.65rem;
            background: rgba(0,245,160,0.15);
            padding: 4px 10px;
            border-radius: 20px;
            color: var(--buy);
        }

        /* Cámara */
        #camera-container {
            position: relative;
            width: 100%;
            height: 35vh;
            min-height: 250px;
            background: #000;
            margin-top: 52px;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ========== DECISIÓN PRINCIPAL - GRANDE Y CLARA ========== */
        .decision-card {
            margin: 16px;
            border-radius: 32px;
            padding: 24px 16px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .decision-card.buy {
            background: linear-gradient(135deg, rgba(0,245,160,0.15) 0%, rgba(0,245,160,0.05) 100%);
            border: 2px solid var(--buy);
        }

        .decision-card.sell {
            background: linear-gradient(135deg, rgba(255,77,77,0.15) 0%, rgba(255,77,77,0.05) 100%);
            border: 2px solid var(--sell);
        }

        .decision-card.neutral {
            background: linear-gradient(135deg, rgba(255,180,71,0.1) 0%, rgba(255,180,71,0.03) 100%);
            border: 2px solid var(--neutral);
        }

        .decision-text {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .decision-card.buy .decision-text { color: var(--buy); text-shadow: 0 0 10px rgba(0,245,160,0.5); }
        .decision-card.sell .decision-text { color: var(--sell); text-shadow: 0 0 10px rgba(255,77,77,0.5); }
        .decision-card.neutral .decision-text { color: var(--neutral); }

        .decision-sub {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* Barra de confianza SIMPLE */
        .confidence-section {
            margin: 16px;
            padding: 12px 16px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
        }

        .confidence-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.8rem;
        }

        .confidence-bar-big {
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 6px;
        }

        .confidence-fill.buy { background: var(--buy); }
        .confidence-fill.sell { background: var(--sell); }
        .confidence-fill.neutral { background: var(--neutral); }

        /* Razón SIMPLE de la decisión */
        .reason-box {
            margin: 16px;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            font-size: 0.85rem;
            text-align: center;
        }

        /* Métricas simplificadas */
        .simple-metrics {
            display: flex;
            justify-content: space-around;
            margin: 16px;
            gap: 12px;
        }

        .metric {
            flex: 1;
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            padding: 10px;
            text-align: center;
        }

        .metric-value {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .metric-value.up { color: var(--buy); }
        .metric-value.down { color: var(--sell); }
        .metric-label {
            font-size: 0.65rem;
            color: #aaa;
            margin-top: 4px;
        }

        /* Historial */
        #chat-log {
            padding: 12px;
            max-height: 25vh;
            overflow-y: auto;
            margin-bottom: 80px;
        }

        .history-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 8px 12px;
            margin-bottom: 6px;
            font-size: 0.7rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-decision.buy { color: var(--buy); }
        .history-decision.sell { color: var(--sell); }
        .history-decision.neutral { color: var(--neutral); }

        /* Botón */
        .floating-buttons {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.95);
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            z-index: 30;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        button {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 44px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
        }

        button:active { transform: scale(0.97); }

        canvas { display: none; }

        @media (max-width: 768px) {
            .decision-text { font-size: 1.8rem; }
            .metric-value { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-title">
        📊 <span>TRADER VISION</span>
    </div>
    <div class="status-badge" id="statusBadge">
        🟢 ANALIZANDO
    </div>
</div>

<div id="camera-container">
    <video id="webcam" autoplay playsinline muted></video>
</div>

<!-- ========== DECISIÓN PRINCIPAL (LO MÁS IMPORTANTE) ========== -->
<div class="decision-card neutral" id="decisionCard">
    <div class="decision-text" id="decisionText">⏳ ESPERANDO</div>
    <div class="decision-sub" id="decisionSub">Apunta la cámara a la gráfica</div>
</div>

<!-- Confianza SIMPLE -->
<div class="confidence-section">
    <div class="confidence-label">
        <span>🎯 CONFIANZA DE LA SEÑAL</span>
        <span id="confidencePercent">0%</span>
    </div>
    <div class="confidence-bar-big">
        <div class="confidence-fill" id="confidenceFill"></div>
    </div>
</div>

<!-- Razón CLARA de la decisión -->
<div class="reason-box" id="reasonBox">
    📌 Apunta la cámara a una gráfica para comenzar
</div>

<!-- Métricas simples -->
<div class="simple-metrics">
    <div class="metric">
        <div class="metric-value" id="trendValue">---</div>
        <div class="metric-label">📈 TENDENCIA</div>
    </div>
    <div class="metric">
        <div class="metric-value" id="strengthValue">---</div>
        <div class="metric-label">💪 FUERZA</div>
    </div>
    <div class="metric">
        <div class="metric-value" id="actionValue">---</div>
        <div class="metric-label">⚡ ACCIÓN</div>
    </div>
</div>

<!-- Historial de decisiones -->
<div id="chat-log">
    <div class="history-item">
        <span>📋 Listo para analizar</span>
        <span class="history-decision neutral">ESPERANDO</span>
    </div>
</div>

<div class="floating-buttons">
    <button id="clearBtn">🗑️ LIMPIAR HISTORIAL</button>
</div>

<canvas id="snapshot"></canvas>

<script>
    (function(){
        // ========== IA SIMPLIFICADA - SOLO LO ESENCIAL ==========
        class SimpleTradingAI {
            constructor() {
                this.frameHistory = [];
                this.maxHistory = 30;
            }
            
            analyzeFrame(imageData, width, height) {
                const features = this.extractFeatures(imageData, width, height);
                
                this.frameHistory.push({
                    timestamp: Date.now(),
                    ...features
                });
                
                if (this.frameHistory.length > this.maxHistory) {
                    this.frameHistory.shift();
                }
                
                if (this.frameHistory.length >= 8) {
                    return this.getSimpleDecision();
                }
                
                return null;
            }
            
            extractFeatures(imageData, width, height) {
                let greenIntensity = 0, redIntensity = 0;
                let samples = 0;
                
                const step = 12;
                for(let y = 0; y < height; y += step) {
                    for(let x = 0; x < width; x += step) {
                        const idx = (y * width + x) * 4;
                        if(idx + 2 < imageData.data.length) {
                            const r = imageData.data[idx];
                            const g = imageData.data[idx+1];
                            const b = imageData.data[idx+2];
                            
                            // Verde = vela alcista
                            if(g > r && g > b && g > 70) {
                                greenIntensity += (g - Math.max(r, b)) / 255;
                                samples++;
                            }
                            // Rojo = vela bajista
                            else if(r > g && r > b && r > 70) {
                                redIntensity += (r - Math.max(g, b)) / 255;
                                samples++;
                            }
                        }
                    }
                }
                
                const greenScore = samples > 0 ? greenIntensity / samples : 0.5;
                const redScore = samples > 0 ? redIntensity / samples : 0.5;
                
                return {
                    netScore: greenScore - redScore,
                    green: greenScore,
                    red: redScore
                };
            }
            
            getSimpleDecision() {
                const n = this.frameHistory.length;
                const scores = this.frameHistory.map(f => f.netScore);
                
                // Últimos 8 frames vs primeros 8 (tendencia)
                const recent = scores.slice(-8);
                const older = scores.slice(0, 8);
                const trend = this.average(recent) - this.average(older);
                
                // Momentum (cambio último frame)
                const lastScore = scores[n - 1];
                const prevScore = scores[n - 2] || lastScore;
                const momentum = lastScore - prevScore;
                
                // ========== DECISIÓN SIMPLE ==========
                let decision = "NEUTRAL";
                let confidence = 50;
                let reason = "";
                let strength = 0;
                let actionText = "";
                
                // Calcular fuerza de la señal (0-100)
                const absTrend = Math.abs(trend);
                const absMomentum = Math.abs(momentum);
                strength = Math.min(100, Math.floor((absTrend * 80) + (absMomentum * 20)));
                
                // LÓGICA CLARA DE DECISIÓN
                if (trend > 0.04 && momentum > 0.01) {
                    decision = "COMPRAR 🟢";
                    confidence = Math.min(95, 65 + Math.floor(absTrend * 80));
                    reason = "Tendencia alcista clara con momentum positivo";
                    actionText = "✅ ENTRAR en largo";
                }
                else if (trend > 0.02) {
                    decision = "COMPRAR 🟢";
                    confidence = Math.min(85, 55 + Math.floor(absTrend * 60));
                    reason = "Tendencia alcista detectada";
                    actionText = "✅ CONSIDERAR entrada";
                }
                else if (trend < -0.04 && momentum < -0.01) {
                    decision = "VENDER 🔴";
                    confidence = Math.min(95, 65 + Math.floor(absTrend * 80));
                    reason = "Tendencia bajista clara con momentum negativo";
                    actionText = "❌ VENDER o no comprar";
                }
                else if (trend < -0.02) {
                    decision = "VENDER 🔴";
                    confidence = Math.min(85, 55 + Math.floor(absTrend * 60));
                    reason = "Tendencia bajista detectada";
                    actionText = "❌ EVITAR compras";
                }
                else {
                    decision = "NO INVERTIR 🟠";
                    confidence = 50 - Math.floor(absTrend * 30);
                    confidence = Math.max(30, confidence);
                    reason = "Mercado lateral o sin dirección clara";
                    actionText = "⏳ ESPERAR mejor momento";
                }
                
                // Ajustar confianza por consistencia
                let consistentCount = 0;
                for(let i = 1; i < recent.length; i++) {
                    if((trend > 0 && recent[i] > recent[i-1]) || (trend < 0 && recent[i] < recent[i-1])) {
                        consistentCount++;
                    }
                }
                const consistency = recent.length > 1 ? consistentCount / (recent.length - 1) : 0.5;
                if (consistency > 0.7) confidence = Math.min(95, confidence + 5);
                if (consistency < 0.4) confidence = Math.max(40, confidence - 10);
                
                confidence = Math.floor(confidence);
                
                return {
                    decision: decision,
                    confidence: confidence,
                    reason: reason,
                    actionText: actionText,
                    trend: trend,
                    momentum: momentum,
                    strength: strength,
                    consistency: Math.floor(consistency * 100)
                };
            }
            
            average(arr) {
                if (arr.length === 0) return 0;
                return arr.reduce((a, b) => a + b, 0) / arr.length;
            }
            
            getColor(decision) {
                if (decision.includes("COMPRAR")) return "buy";
                if (decision.includes("VENDER")) return "sell";
                return "neutral";
            }
        }
        
        // ========== UI ==========
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('snapshot');
        const clearBtn = document.getElementById('clearBtn');
        const chatLog = document.getElementById('chat-log');
        const statusBadge = document.getElementById('statusBadge');
        
        // Elementos principales
        const decisionCard = document.getElementById('decisionCard');
        const decisionText = document.getElementById('decisionText');
        const decisionSub = document.getElementById('decisionSub');
        const confidencePercent = document.getElementById('confidencePercent');
        const confidenceFill = document.getElementById('confidenceFill');
        const reasonBox = document.getElementById('reasonBox');
        const trendValue = document.getElementById('trendValue');
        const strengthValue = document.getElementById('strengthValue');
        const actionValue = document.getElementById('actionValue');
        
        let cameraActive = false;
        let analysisInterval = null;
        let lastDecision = null;
        let decisionCount = 0;
        const ai = new SimpleTradingAI();
        
        function addToHistory(decision, confidence, reason) {
            const div = document.createElement('div');
            div.className = 'history-item';
            const decisionClass = decision.includes("COMPRAR") ? "buy" : decision.includes("VENDER") ? "sell" : "neutral";
            const time = new Date().toLocaleTimeString();
            div.innerHTML = `
                <span>🕐 ${time} - ${reason.substring(0, 40)}</span>
                <span class="history-decision ${decisionClass}">${decision}</span>
            `;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
            
            // Limitar historial
            while (chatLog.children.length > 15) {
                chatLog.removeChild(chatLog.firstChild);
            }
        }
        
        function updateUI(decision) {
            if (!decision) return;
            
            const color = ai.getColor(decision.decision);
            
            // Actualizar tarjeta principal
            decisionCard.className = `decision-card ${color}`;
            decisionText.innerHTML = decision.decision;
            
            // Texto de acción claro
            if (decision.decision.includes("COMPRAR")) {
                decisionSub.innerHTML = "✅ SUGERENCIA: " + decision.actionText;
            } else if (decision.decision.includes("VENDER")) {
                decisionSub.innerHTML = "❌ SUGERENCIA: " + decision.actionText;
            } else {
                decisionSub.innerHTML = "⏳ SUGERENCIA: " + decision.actionText;
            }
            
            // Barra de confianza
            confidencePercent.innerHTML = `${decision.confidence}%`;
            confidenceFill.style.width = `${decision.confidence}%`;
            confidenceFill.className = `confidence-fill ${color}`;
            
            // Razón clara
            reasonBox.innerHTML = `📌 ${decision.reason} (Consistencia: ${decision.consistency}%)`;
            
            // Métricas simples
            const trendFormatted = decision.trend > 0 ? `+${decision.trend.toFixed(3)}` : decision.trend.toFixed(3);
            trendValue.innerHTML = trendFormatted;
            trendValue.className = `metric-value ${decision.trend > 0 ? 'up' : decision.trend < 0 ? 'down' : ''}`;
            
            strengthValue.innerHTML = `${decision.strength}%`;
            strengthValue.className = `metric-value ${decision.strength > 60 ? 'up' : decision.strength > 30 ? '' : 'down'}`;
            
            actionValue.innerHTML = decision.decision.includes("COMPRAR") ? "COMPRAR" : decision.decision.includes("VENDER") ? "VENDER" : "ESPERAR";
            actionValue.className = `metric-value ${decision.decision.includes("COMPRAR") ? 'up' : decision.decision.includes("VENDER") ? 'down' : ''}`;
            
            // Cambiar badge de estado
            statusBadge.innerHTML = decision.decision.includes("COMPRAR") ? "🟢 SEÑAL COMPRA" : decision.decision.includes("VENDER") ? "🔴 SEÑAL VENTA" : "🟠 ESPERANDO";
            
            // Agregar al historial cuando cambia la decisión
            if (lastDecision !== decision.decision) {
                addToHistory(decision.decision, decision.confidence, decision.reason);
                lastDecision = decision.decision;
                decisionCount = 0;
            }
        }
        
        async function captureAndAnalyze() {
            if (!cameraActive || !video.videoWidth) return;
            
            try {
                canvas.width = 320;
                canvas.height = 240;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const decision = ai.analyzeFrame(imageData, canvas.width, canvas.height);
                
                if (decision) {
                    updateUI(decision);
                }
                
            } catch (error) {
                console.error("Error:", error);
            }
        }
        
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });
                cameraActive = true;
                
                analysisInterval = setInterval(() => {
                    captureAndAnalyze();
                }, 800); // ~1.2 fps para mejor rendimiento
                
                reasonBox.innerHTML = "📌 ✅ Cámara activa - Analizando gráfica en tiempo real";
                
            } catch(err) {
                console.error(err);
                cameraActive = false;
                decisionText.innerHTML = "❌ ERROR";
                decisionSub.innerHTML = "No se pudo acceder a la cámara";
                reasonBox.innerHTML = "📌 ❌ Verifica los permisos de cámara";
            }
        }
        
        clearBtn.addEventListener('click', () => {
            while(chatLog.children.length > 1) {
                chatLog.removeChild(chatLog.lastChild);
            }
            addToHistory("SISTEMA", 0, "Historial limpiado");
        });
        
        window.addEventListener('load', startCamera);
        
        window.addEventListener('beforeunload', () => {
            if (analysisInterval) clearInterval(analysisInterval);
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        });
        
    })();
</script>
</body>
</html>
