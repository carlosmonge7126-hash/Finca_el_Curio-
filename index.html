<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IA Trader Vision Pro</title>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #000;
            --panel: rgba(20, 20, 20, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #camera-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            background: #000;
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
        }

        #chat-log {
            position: absolute;
            top: 12px; left: 12px; right: 12px;
            max-height: 45%;
            overflow-y: auto;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .msg {
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 88%;
            font-size: 15px;
            line-height: 1.4;
            backdrop-filter: blur(12px);
            pointer-events: auto;
        }

        .user-msg {
            background: rgba(0, 123, 255, 0.75);
            align-self: flex-end;
        }

        .ai-msg {
            background: rgba(15, 15, 15, 0.9);
            align-self: flex-start;
            border-left: 4px solid var(--primary);
            color: #00ffaa;
        }

        .controls {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            z-index: 3;
            background: var(--panel);
            padding: 16px 12px;
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 16px;
        }

        button {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        button:disabled { opacity: 0.6; cursor: not-allowed; }
        canvas { display: none; }

        .status {
            position: absolute;
            top: 12px; right: 12px;
            background: rgba(0,0,0,0.8);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 4;
        }
    </style>
</head>
<body>
    <div id="camera-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>
    
    <div class="status" id="status">Iniciando cámara...</div>
    
    <div id="chat-log">
        <div class="msg ai-msg">
            <strong>IA Trader Vision Pro</strong><br>
            Apunta a la gráfica y presiona ANALIZAR
        </div>
    </div>

    <div class="controls">
        <input type="text" id="user-prompt" placeholder="¿Qué ves en esta gráfica?">
        <button id="send-btn">ANALIZAR</button>
    </div>

    <canvas id="snapshot"></canvas>

    <script>
        const API_KEY = "AIzaSyCvzHBFAa_flCedpCWko7vz6gOyr2bnego";   // ← Cambia esto por tu clave real

        const video = document.getElementById('webcam');
        const canvas = document.getElementById('snapshot');
        const promptInput = document.getElementById('user-prompt');
        const sendBtn = document.getElementById('send-btn');
        const chatLog = document.getElementById('chat-log');
        const statusEl = document.getElementById('status');

        const MODELS = [
            "gemini-3.5-flash",
            "gemini-3.1-flash-lite",
            "gemini-2.5-flash",
            "gemini-2.5-flash-lite"
        ];

        async function startCamera() {
            statusEl.textContent = "Solicitando permisos de cámara...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: "environment",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    statusEl.textContent = "✅ Cámara activa";
                    statusEl.style.color = "#00ff88";
                };
            } catch (err) {
                console.error(err);
                statusEl.textContent = "❌ Error cámara: " + err.message;
                statusEl.style.color = "#ff4444";
                addMessage("No se pudo acceder a la cámara. Asegúrate de permitir los permisos.", "ai");
            }
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}-msg`;
            div.innerHTML = type === 'ai' ? text.replace(/\n/g, '<br>') : text;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        async function tryModel(modelName, base64Image, prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${API_KEY}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ 
                        parts: [
                            { text: prompt },
                            { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                        ]
                    }],
                    generationConfig: { temperature: 0.6, maxOutputTokens: 1000 }
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            return data.candidates[0].content.parts[0].text;
        }

        async function runAnalysis() {
            const prompt = promptInput.value.trim() || "¿Qué ves en esta gráfica de trading? Analiza tendencia, soportes, resistencias y setups.";
            
            addMessage(prompt, 'user');
            promptInput.value = "";
            sendBtn.disabled = true;
            statusEl.textContent = "Capturando imagen...";

            canvas.width = video.videoWidth || 1280;
            canvas.height = video.videoHeight || 720;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const base64Image = canvas.toDataURL('image/jpeg', 0.78).split(',')[1];

            let success = false;

            for (const model of MODELS) {
                try {
                    statusEl.textContent = `Probando ${model}...`;
                    const responseText = await tryModel(model, base64Image, prompt);
                    addMessage(`<strong>[${model}]</strong><br>${responseText}`, "ai");
                    success = true;
                    break;
                } catch (err) {
                    console.warn(`Modelo ${model} falló:`, err.message);
                }
            }

            if (!success) {
                addMessage("Error: No se pudo conectar con la IA. Revisa tu API Key.", "ai");
            }

            sendBtn.disabled = false;
            statusEl.textContent = "✅ Cámara activa";
        }

        // Eventos
        sendBtn.addEventListener('click', runAnalysis);
        promptInput.addEventListener('keypress', e => { if (e.key === 'Enter') runAnalysis(); });

        // Iniciar
        window.addEventListener('load', () => {
            startCamera();
        });
    </script>
</body>
</html>
